version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8001:8001"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  frontend:
    build: ./frontend
    ports:
      - "5174:5174"
    environment:
      - VITE_API_BASE_URL=http://localhost:8001

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
